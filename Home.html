<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Issue Arcade - Home</title>

    <link rel="stylesheet" href="Home.css">
    <link rel="icon" type="image/png" href="Logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="navbar-img">
            <img src="MenuButton.png" alt="Menu" class="menu-button" id="menuButton">
        </div>
    </nav>

    <!-- GAME CARDS -->
    <div class="image-container">

        <div class="image image-con">
            <a href="MemoryFlip.html">
                <img src="LoadingBackground.png" alt="Game 1" class="clickable-img game1">
            </a>
        </div>

        <div class="image image-con">
            <a href="Wordle.html">
                <img src="LoadingBackground.png" alt="Game 2" class="clickable-img game2">
            </a>
        </div>
        
        <div class="image image-con">
            <a href="SnakeGames.html">
                <img src="LoadingBackground.png" alt="Game 3" class="clickable-img game3">
            </a>         
        </div>

    </div>

    <!-- OVERLAY + POPUP -->
    <div class="overlay" id="overlay">

        <div class="menu-popup" id="menuPopup" onclick="event.stopPropagation()">

            <button class="back-btn" onclick="closeMenu()">BACK</button>

            <img src="MenuPic.png" class="menu-title">

            <img src="Start.png" class="menu-img" onclick="alert('Start Game')">
            <img src="About.png" class="menu-img" onclick="alert('Settings')">
            <img src="Settings.png" class="menu-img" onclick="closeMenu()">

        </div>

    </div>

    <!-- FOOTER -->
    <div class="copyright">
        © 2026 Skill Issue Arcade. All Rights Reserved.
    </div>

    <script>
            const menuButton = document.getElementById('menuButton');
            const menuPopup = document.getElementById('menuPopup');
            const overlay = document.getElementById('overlay');

            menuButton.addEventListener('click', () => {
                menuPopup.style.display = 'flex';
                overlay.style.display = 'block';
            });

            function closeMenu() {
                menuPopup.style.display = 'none';
                overlay.style.display = 'none';
            }

            overlay.addEventListener('click', closeMenu);
        </script>

</body>
</html>
