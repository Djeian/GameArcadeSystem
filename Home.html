<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Issue Arcade - Home</title>

    <link rel="stylesheet" href="Home.css">
    <link rel="icon" type="image/png" href="Logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>

    <nav class="navbar">
        <div class="navbar-img">
            <img src="MenuButton.png" alt="Menu" class="menu-button" id="menuButton">
        </div>
    </nav>

    <div class="image-container">

        <div class="image image-con">
            <a href="MemoryFlip.html">
                <img src="MemoryFlipTN.png" alt="Game 1" class="clickable-img game1">
            </a>
        </div>

        <div class="image image-con">
            <a href="Wordle.html">
                <img src="WordleTN.png" alt="Game 2" class="clickable-img game2">
            </a>
        </div>
        
        <div class="image image-con">
            <a href="SnakeGames.html">
                <img src="SnakeTN.png" alt="Game 3" class="clickable-img game3">
            </a>         
        </div>

    </div>
    <div class="middle-button">
        <a href="Tournament.html">
            <img src="TournamentBtn.png" alt="Play Button" class="bottom-btn">
        </a>
    </div>

    <div class="overlay" id="overlay">

        <div class="menu-popup" id="menuPopup" onclick="event.stopPropagation()">

            <button class="back-btn" onclick="closeMenu()">BACK</button>

            <img src="MenuPic.png" class="menu-title">

            <img src="LeaderBoard.png" class="menu-img" onclick="window.location.href='LeaderBoard.html'">
            <img src="About.png" class="menu-img" onclick="window.location.href='AboutUs.html'">
            <img src="Settings.png" class="menu-img" onclick="openSettings()">

        </div>

        <div id="settingsModal">
    <h2>SETTINGS</h2>

    <div class="setting-option">
        <label>Sound</label>
        <label class="switch">
            <input type="checkbox" id="soundToggle" checked>
            <span class="slider"></span>
        </label>
    </div>

    <div id="closeSettings">CLOSE</div>
</div>

    </div>

    <div class="copyright">
        © 2026 Skill Issue Arcade. All Rights Reserved.
    </div>

    <script>
            const menuButton = document.getElementById('menuButton');
const menuPopup = document.getElementById('menuPopup');
const overlay = document.getElementById('overlay');

menuButton.addEventListener('click', () => {
    menuPopup.style.display = 'flex';
    overlay.style.display = 'block';
});

function closeMenu() {
    menuPopup.style.display = 'none';
    overlay.style.display = 'none';
}

function openSettings() {
    document.getElementById('settingsModal').style.display = 'flex';
    document.body.classList.add('modal-open');
}

document.getElementById('closeSettings').onclick = () => {
    document.getElementById('settingsModal').style.display = 'none';
    document.body.classList.remove('modal-open');
}

const soundToggle = document.getElementById('soundToggle');

soundToggle.checked = localStorage.getItem('sound') !== 'off';

soundToggle.onchange = () => {
    localStorage.setItem('sound', soundToggle.checked ? 'on' : 'off');
    console.log("Sound is now", soundToggle.checked ? "ON" : "OFF");
}

overlay.addEventListener('click', closeMenu);
        </script>

</body>
</html>
